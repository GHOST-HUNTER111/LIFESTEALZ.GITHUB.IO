<!DOCTYPE html>
<html lang="en">
<head>

  <title>Lifestealz Form</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Minecraft', monospace;
    }

    iframe {
      border: 0;
      width: 100%;
      height: 100%;
    }

    /* Back Button */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 14px;
      background: #8b7a52;
      border: 3px solid #4e432b;
      color: white;
      font-family: 'Minecraft', monospace;
      text-decoration: none;
      cursor: pointer;
      z-index: 9999;
    }

    .back-btn:hover {
      background: #a8925f;
    }
  </style>

  <script>
    // Disable right click
    document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });
  </script>
</head>

<body>

  <!-- BACK TO HOME BUTTON -->
  <a href="index.html" class="back-btn">⬅ HOME</a>

    frameborder="0"

</html>
