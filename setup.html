<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Setup - Lifestealz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#0f1115;
  color:white;
}
.wrapper{
  padding:40px;
}
.hidden{
  display:none;
}
</style>
</head>
<body>
<div id="content" class="hidden">
  <div class="wrapper">
    <h1>Setup</h1>
    <p>Only visible when logged in with a verified account.</p>
    <!-- your setup stuff here -->
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD4xpW811BTN2VDPIJyMMzdHI1lFBF8bxI",
  authDomain: "lifestealz.firebaseapp.com",
  projectId: "lifestealz",
  appId: "1:947239348718:web:2b56d45ddbda32471fc6ff"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(user=>{
  if(user && user.emailVerified){
    document.getElementById("content").classList.remove("hidden");
  }else{
    // stays blank if not logged in
    document.body.innerHTML = "";
  }
});
</script>
</body>
</html>
