<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donut SMP Lifesteal Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Press Start 2P', cursive;
}

body{
overflow:hidden;
background:black;
color:white;
text-align:center;
}

/* canvas background */

#bg{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* main container */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:40px;
background:rgba(0,0,0,0.6);
border:3px solid #00ff9d;
border-radius:12px;
backdrop-filter: blur(6px);
}

h1{
font-size:28px;
color:#00ff9d;
margin-bottom:20px;
text-shadow:0 0 15px #00ff9d;
}

p{
font-size:12px;
line-height:1.8;
margin-bottom:25px;
}

/* button */

.joinBtn{
display:inline-block;
padding:18px 35px;
background:#00ff9d;
color:black;
text-decoration:none;
border-radius:8px;
font-size:12px;
transition:all .25s;
box-shadow:0 0 15px #00ff9d;
}

.joinBtn:hover{
transform:scale(1.1);
background:#00ffaa;
box-shadow:0 0 30px #00ffaa;
}

.prize{
color:#ffd700;
font-size:14px;
margin-top:10px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<h1>DONUT SMP</h1>

<p>
🔥 LIFESTEAL EVENT 🔥<br><br>
Fight players.<br>
Steal hearts.<br>
Become the strongest.<br><br>

Compete for the ultimate prize.
</p>

<div class="prize">
💰 HUGE CASH PRIZE 💰
</div>

<br><br>

<a id="joinButton" class="joinBtn" href="https://your-link-here.com">
JOIN THE SERVER
</a>

</div>

<script>

/* CONFIGURABLE LINK */

const customLink = "https://your-link-here.com";
document.getElementById("joinButton").href = customLink;

/* background particles */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle{
constructor(){
this.x = Math.random()*canvas.width;
this.y = Math.random()*canvas.height;
this.size = Math.random()*3+1;
this.speedX = Math.random()*1-0.5;
this.speedY = Math.random()*1-0.5;
}

update(){
this.x += this.speedX;
this.y += this.speedY;

if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
}

draw(){
ctx.fillStyle = "#00ff9d";
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();
}
}

function init(){
for(let i=0;i<120;i++){
particles.push(new Particle());
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.update();
p.draw();
});

connect();

requestAnimationFrame(animate);
}

function connect(){
for(let a=0;a<particles.length;a++){
for(let b=a;b<particles.length;b++){

let dx = particles[a].x - particles[b].x;
let dy = particles[a].y - particles[b].y;
let distance = dx*dx + dy*dy;

if(distance < 9000){
ctx.strokeStyle="rgba(0,255,157,0.1)";
ctx.lineWidth=1;
ctx.beginPath();
ctx.moveTo(particles[a].x,particles[a].y);
ctx.lineTo(particles[b].x,particles[b].y);
ctx.stroke();
}

}
}
}

/* mouse interaction */

let mouse = {
x:null,
y:null
}

window.addEventListener("mousemove",(event)=>{
mouse.x = event.x;
mouse.y = event.y;

particles.forEach(p=>{
let dx = p.x - mouse.x;
let dy = p.y - mouse.y;
let dist = Math.sqrt(dx*dx+dy*dy);

if(dist < 120){
p.x += dx/10;
p.y += dy/10;
}
});

});

window.addEventListener("resize",()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

init();
animate();

</script>

</body>
</html>
